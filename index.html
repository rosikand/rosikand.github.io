---
layout: default
title: Home
---

{% assign profile = site.data.profile %}

<section class="about-section{% if profile.show_photo and profile.photo %} with-photo{% endif %}">
    {% if profile.show_photo and profile.photo %}
    <img class="profile-photo" src="{{ profile.photo | relative_url }}" alt="{{ profile.name }}">
    {% endif %}
    <div class="bio-content">
        {{ profile.bio | markdownify }}
    </div>
</section>

{% if profile.email %}
<section class="contact-info">
    <p><a href="mailto:{{ profile.email }}">{{ profile.email }}</a></p>
</section>
{% endif %}
