bio: |
  Hey! I'm Rohan. I am a BS/MS student at Stanford University studying Computer Science. I am interested in **AI research, ML engineering, startups, and venture capital**. I spend about half my day thinking, reading, and doing ML [research](./research) and the other half is spent thinking and writing about [AI startups](./posts/notes-on-ai-landscape) and venture capital. Sometimes, though infrequently, I go to class. 
  
   
  
  In the past, I’ve conducted research in **self-supervised learning** at SAIL, engineered vision models at **insitro**, and built many ML projects. I am currently interested in **RL, continual learning, post-training for foundation models**. See my (informal) [research notebook](https://rosikand.github.io/rl/) for more on this. 

  

  I also infrequently (hopefully more soon!) write about startups and venture capital on **Substack** at [**Rohan’s Random Walks**](https://rosikand.substack.com/) and more informally on the [**blog**](./posts) page. 

  I grew up playing competitive golf in Colts Neck, NJ, and these days I enjoy playing tennis and getting back out on the course when I can. Feel free to reach out!

